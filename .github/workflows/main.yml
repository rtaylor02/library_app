name: CI/CD to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          elasticbeanstalk-app-name: ${{ secrets.EB_APP_NAME }}
          elasticbeanstalk-env-name: ${{ secrets.EB_ENV_NAME }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS \
              --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build and tag Docker images
        run: |
          docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.EB_APP_NAME }}-backend:${GITHUB_SHA} ./backend/libraryapp
          docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.EB_APP_NAME }}-frontend:${GITHUB_SHA} ./frontend/react-library-app

      - name: Push Docker images
        run: |
          REPO_NAME="${{ secrets.EB_APP_NAME }}-backend"
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          
          aws ecr describe-repositories \
          --repository-names "$REPO_NAME" \
          --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1 || \
          aws ecr create-repository \
          --repository-name "$REPO_NAME" \
          --region "${{ secrets.AWS_REGION }}"
          
          docker push "$REGISTRY/$REPO_NAME:${GITHUB_SHA}"

      - name: Update docker-compose.yml with new image tags
        run: |
          sed -i "s|${{ secrets.EB_APP_NAME }}-backend:.*|${{ secrets.EB_APP_NAME }}-backend-app:${GITHUB_SHA}|g" docker-compose.yml
          sed -i "s|${{ secrets.EB_APP_NAME }}-frontend:.*|${{ secrets.EB_APP_NAME }}-frontend-app:${GITHUB_SHA}|g" docker-compose.yml

      - name: Package Dockerrun for EB
        run: |
          #mkdir -p deploy
          #cp docker-compose.yml deploy/
          #cd deploy
          zip -r deploy-${GITHUB_SHA}.zip docker-compose.yml

      - name: Upload to S3
        run: |
          aws s3 cp deploy-${GITHUB_SHA}.zip s3://elasticbeanstalk-${{ secrets.AWS_REGION }}-${{ secrets.AWS_ACCOUNT_ID }}/

      - name: Deploy to Elastic Beanstalk
        run: |
          EB_APP="${{ secrets.EB_APP_NAME }}"
          EB_ENV="${{ secrets.EB_ENV_NAME }}"
          
          # Create completely new app OR create new app version
          if aws elasticbeanstalk describe-applications --application-names $EB_APP >/dev/null 2>&1; then
            echo "Application $EB_APP already exists. Creating new version instead..."
            aws elasticbeanstalk create-application-version \
            --application-name $EB_APP \
            --version-label $GITHUB_SHA \
            --source-bundle S3Bucket="elasticbeanstalk-${{ secrets.AWS_REGION }}-${{ secrets.AWS_ACCOUNT_ID }}",S3Key="deploy-${GITHUB_SHA}.zip"
          else
            echo "Application $EB_APP does not exist. Creating new application..."
            aws elasticbeanstalk create-application \
              --application-name $EB_APP \
              --description "JavaRchitect Library Application deployed via GitHub Actions"
          fi         
          
          # Update or create environment
          if aws elasticbeanstalk describe-environments --application-name $EB_APP --environment-names $EB_ENV | grep -q '"Status":'; then
            echo "Updating existing environment..."
            aws elasticbeanstalk update-environment \
              --application-name $EB_APP \
              --environment-name $EB_ENV \
              --version-label $GITHUB_SHA
          else
            echo "Environment $EB_ENV does not exist. Creating new environment..."
            aws elasticbeanstalk create-environment \
              --application-name $EB_APP \
              --environment-name $EB_ENV \
              --solution-stack-name "64bit Amazon Linux 2023 v4.6.3 running Docker" \
              --option-settings \
                  Namespace=aws:autoscaling:launchconfiguration,OptionName=InstanceType,Value=t3.small \
                  Namespace=aws:autoscaling:launchconfiguration,OptionName=IamInstanceProfile,Value=aws-elasticbeanstalk-ec2-role \
              --operations-role "arn:aws:iam::216207491357:role/aws-elasticbeanstalk-service-role" \
              --version-label $GITHUB_SHA
          fi
  
